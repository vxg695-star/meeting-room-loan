<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>單位借物系統表單設計</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #loading-overlay { position:fixed;inset:0;background:rgba(15,23,42,0.7);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;color:white;gap:12px; }
        .spinner { width:40px;height:40px;border:4px solid rgba(255,255,255,0.2);border-top-color:#60a5fa;border-radius:50%;animation:spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

    <!-- 載入中遮罩 -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <div class="text-sm font-medium text-blue-200">連線至 Firebase 資料庫中…</div>
    </div>

    <header class="bg-[#1e293b] text-white px-6 py-4 flex justify-between items-center shadow-md">
        <div class="flex items-center space-x-3">
            <div class="bg-blue-500 p-2 rounded text-white flex items-center justify-center">
                <i class="fa-solid fa-boxes-stacked text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-wider">單位借物系統</h1>
                <p class="text-xs text-gray-400">EQUIPMENT LOAN SYSTEM</p>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <div class="text-sm text-gray-300">填單日期：<span id="current-date" class="font-medium text-white"></span></div>
            <div id="login-status-area" class="flex items-center space-x-2"></div>
        </div>
    </header>

    <main class="flex-1 p-6 max-w-[1600px] w-full mx-auto space-y-4">
        
        <div class="bg-white rounded-xl shadow-sm p-2 flex border border-gray-100 max-w-md">
            <button onclick="switchTab('loan-list')" id="tab-loan-list" class="flex-1 py-2 text-center font-bold rounded-lg transition text-blue-600 bg-blue-50 text-sm">借用清單</button>
            <button onclick="switchTab('inventory')" id="tab-inventory" class="flex-1 py-2 text-center font-bold rounded-lg transition text-gray-500 hover:text-gray-700 text-sm">現有庫存狀態</button>
            <button onclick="switchTab('dept-mgmt')" id="tab-dept-mgmt" class="flex-1 py-2 text-center font-bold rounded-lg transition text-gray-500 hover:text-gray-700 text-sm hidden">管理單位清單</button>
            <button onclick="switchTab('ip-log')" id="tab-ip-log" class="flex-1 py-2 text-center font-bold rounded-lg transition text-gray-500 hover:text-gray-700 text-sm hidden">操作紀錄</button>
        </div>

        <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-wrap items-center gap-4">
            <div id="status-filter-group" class="flex bg-gray-100 p-1 rounded-lg space-x-1">
                <button onclick="filterStatus('全部')" id="btn-filter-all" class="px-4 py-1.5 rounded-md text-sm font-medium transition bg-slate-800 text-white shadow-sm">全部 <span id="count-all" class="ml-1 text-xs opacity-80">0</span></button>
                <button onclick="filterStatus('待領取')" id="btn-filter-pending" class="px-4 py-1.5 rounded-md text-sm font-medium transition text-gray-600 hover:text-gray-900">待領取 <span id="count-pending" class="ml-1 text-xs opacity-80">0</span></button>
                <button onclick="filterStatus('借用中')" id="btn-filter-borrowing" class="px-4 py-1.5 rounded-md text-sm font-medium transition text-gray-600 hover:text-gray-900">借用中 <span id="count-borrowing" class="ml-1 text-xs opacity-80">0</span></button>
                <button onclick="filterStatus('已歸還')" id="btn-filter-returned" class="px-4 py-1.5 rounded-md text-sm font-medium transition text-gray-600 hover:text-gray-900">已歸還 <span id="count-returned" class="ml-1 text-xs opacity-80">0</span></button>
            </div>

            <div class="flex items-center space-x-2 bg-gray-50 px-3 py-1.5 rounded-lg border border-gray-200 text-sm">
                <span id="date-search-label" class="text-gray-600 font-bold"><i class="fa-solid fa-filter mr-1 text-blue-500"></i> 使用日期查詢：</span>
                <input type="date" id="search-start-date" onchange="handleDateFilterChange()" class="bg-white border border-gray-300 rounded px-2 py-0.5 focus:outline-none focus:border-blue-500">
                <span class="text-gray-400">～</span>
                <input type="date" id="search-end-date" onchange="handleDateFilterChange()" class="bg-white border border-gray-300 rounded px-2 py-0.5 focus:outline-none focus:border-blue-500">
                <button onclick="clearDateSearch()" class="text-gray-400 hover:text-gray-600 ml-1" title="清除日期"><i class="fa-solid fa-circle-xmark"></i></button>
            </div>
            
            <div id="search-tip" class="text-xs text-blue-600 bg-blue-50 px-2.5 py-1 rounded border border-blue-100 hidden">
                <i class="fa-solid fa-info-circle mr-1"></i>目前顯示：<span id="inventory-date-label" class="font-bold">今日</span> 庫存餘額。
            </div>

            <div class="ml-auto flex items-center space-x-2" id="toolbar-action-area">
                <div id="mark-toolbar" class="hidden items-center gap-2">
                    <span class="text-xs text-gray-500 font-medium">標記底色：</span>
                    <div class="flex gap-1">
                        <button onclick="applyMark('#fef08a')" class="w-6 h-6 rounded border border-gray-300 hover:scale-110 transition" style="background:#fef08a" title="黃色"></button>
                        <button onclick="applyMark('#bbf7d0')" class="w-6 h-6 rounded border border-gray-300 hover:scale-110 transition" style="background:#bbf7d0" title="綠色"></button>
                        <button onclick="applyMark('#bfdbfe')" class="w-6 h-6 rounded border border-gray-300 hover:scale-110 transition" style="background:#bfdbfe" title="藍色"></button>
                        <button onclick="applyMark('#fecaca')" class="w-6 h-6 rounded border border-gray-300 hover:scale-110 transition" style="background:#fecaca" title="紅色"></button>
                        <button onclick="applyMark('#e9d5ff')" class="w-6 h-6 rounded border border-gray-300 hover:scale-110 transition" style="background:#e9d5ff" title="紫色"></button>
                        <button onclick="applyMark('')" class="w-6 h-6 rounded border border-gray-300 hover:scale-110 transition bg-white flex items-center justify-center" title="清除標記"><i class="fa-solid fa-xmark text-gray-400 text-xs"></i></button>
                    </div>
                    <span id="mark-count" class="text-xs text-blue-600 font-medium"></span>
                </div>
                <button onclick="openLoanModal()" class="bg-[#1e293b] hover:bg-slate-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition flex items-center space-x-2 shadow-sm">
                    <i class="fa-solid fa-plus text-xs"></i>
                    <span>新增借用單</span>
                </button>
            </div>
        </div>

        <div id="panel-loan-list" class="space-y-4">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[1000px]">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-100 text-gray-500 text-xs font-medium">
                            <th class="px-2 py-3 w-8 text-center" id="th-checkbox"><input type="checkbox" id="check-all" onchange="toggleAllCheck(this.checked)" class="rounded text-blue-600 w-4 h-4 hidden"></th>
                            <th class="px-3 py-3 w-28">狀態</th>
                            <th class="px-3 py-3">借用人</th>
                            <th class="px-3 py-3 w-36">單位</th>
                            <th class="px-3 py-3 w-20">分機</th>
                            <th class="px-3 py-3 w-36">使用日期/時段</th>
                            <th class="px-3 py-3 w-24">地點</th>
                            <th class="px-3 py-3">借用物</th>
                            <th class="px-3 py-3 w-32">歸還時間</th>
                            <th class="px-3 py-3">備註</th>
                            <th class="px-3 py-3 text-center w-16">操作</th>
                        </tr>
                    </thead>
                    <tbody id="loan-table-body" class="text-sm divide-y divide-gray-100 text-gray-700"></tbody>
                </table>
            </div>
        </div>

        <div id="panel-inventory" class="hidden space-y-4 max-w-2xl">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div id="inventory-management-card" class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 space-y-4 h-fit hidden">
                    <h2 class="text-base font-bold text-gray-800 flex items-center"><i class="fa-solid fa-warehouse mr-2 text-blue-500"></i>管理庫存上限設定</h2>
                    <div class="flex flex-col gap-3">
                        <div class="flex gap-2">
                            <input type="text" id="new-item-name" placeholder="輸入物品名稱..." class="flex-1 bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                            <input type="number" id="new-item-total" placeholder="上限數量" min="1" value="10" class="w-24 bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm text-center focus:outline-none focus:border-blue-500">
                        </div>
                        <button onclick="addInventoryItem()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg text-sm transition flex items-center justify-center space-x-1 shadow-sm">
                            <i class="fa-solid fa-plus"></i>
                            <span>新增品項與庫存總數</span>
                        </button>
                    </div>
                </div>

                <div id="inventory-status-card" class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden col-span-2 md:col-span-1">
                    <div class="bg-gray-100 p-3 font-bold text-sm text-gray-700 border-b border-gray-200 flex justify-between items-center">
                        <span>物品名稱</span>
                        <span id="inventory-table-title-date" class="text-xs text-blue-600 font-medium">指定日期剩餘可用數 / 總限制</span>
                    </div>
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-100 text-gray-500 text-xs font-medium">
                                <th class="p-3 text-center w-16 id-sort-th">排序</th>
                                <th class="p-3">物品名稱</th>
                                <th class="p-3 text-center w-40">該日剩餘數 / 總限制</th>
                                <th class="p-3 text-center w-20 id-delete-th">刪除</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-table-body" class="text-sm divide-y divide-gray-100 text-gray-700"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="panel-ip-log" class="hidden space-y-3 max-w-4xl">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="bg-gray-50 px-5 py-3 border-b border-gray-100 flex items-center justify-between">
                    <h2 class="font-bold text-sm text-gray-700"><i class="fa-solid fa-clipboard-list mr-2 text-blue-500"></i>申請單操作 IP 紀錄</h2>
                    <button onclick="loadIPLogs()" class="text-xs bg-blue-50 text-blue-600 border border-blue-100 px-3 py-1 rounded-lg hover:bg-blue-100 transition"><i class="fa-solid fa-rotate-right mr-1"></i>重新整理</button>
                </div>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-100 text-gray-500 text-xs font-medium">
                                <th class="px-4 py-2 w-40">時間</th>
                                <th class="px-4 py-2 w-32">IP 位址</th>
                                <th class="px-4 py-2 w-24">操作</th>
                                <th class="px-4 py-2">說明</th>
                            </tr>
                        </thead>
                        <tbody id="ip-log-table-body" class="text-sm divide-y divide-gray-100 text-gray-700">
                            <tr><td colspan="4" class="p-6 text-center text-gray-400">載入中…</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="panel-dept-mgmt" class="hidden space-y-4 max-w-xl">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="bg-gray-50 px-5 py-3 border-b border-gray-100 flex items-center justify-between">
                    <h2 class="font-bold text-sm text-gray-700"><i class="fa-solid fa-building mr-2 text-blue-500"></i>單位清單管理</h2>
                    <span id="dept-count-badge" class="text-xs text-gray-400"></span>
                </div>
                <div id="dept-mgmt-login-notice" class="p-5 text-sm text-amber-700 bg-amber-50 border-b border-amber-100 hidden">
                    <i class="fa-solid fa-lock mr-1"></i>請先登入才能新增或刪除單位。
                </div>
                <div id="dept-add-row" class="p-4 border-b border-gray-100 hidden">
                    <div class="flex gap-2">
                        <input type="text" id="new-dept-code" placeholder="代碼（如 7760）" maxlength="8" class="w-32 bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500 font-mono">
                        <input type="text" id="new-dept-name" placeholder="單位名稱（如 麻醉部）" class="flex-1 bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                        <button onclick="addDeptItem()" class="bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-lg transition shadow-sm whitespace-nowrap">
                            <i class="fa-solid fa-plus mr-1"></i>新增
                        </button>
                    </div>
                </div>
                <div class="overflow-y-auto max-h-[60vh]">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-100 text-gray-500 text-xs font-medium">
                                <th class="px-4 py-2 w-24">代碼</th>
                                <th class="px-4 py-2">單位名稱</th>
                                <th class="px-4 py-2 w-16 text-center" id="dept-del-th">刪除</th>
                            </tr>
                        </thead>
                        <tbody id="dept-mgmt-table-body" class="text-sm divide-y divide-gray-100 text-gray-700"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="loan-modal" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center hidden opacity-0 transition-opacity duration-200">
        <div class="bg-white rounded-xl shadow-xl max-w-2xl w-full mx-4 overflow-hidden transform scale-95 transition-transform duration-200 flex flex-col max-h-[90vh]">
            <div class="bg-slate-900 text-white p-4 flex justify-between items-center">
                <h3 class="font-bold text-lg" id="loan-modal-title">＋ 新增借用單</h3>
                <button onclick="closeLoanModal()" class="text-gray-400 hover:text-white text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-6 overflow-y-auto space-y-4 flex-1 grid grid-cols-2 gap-4">
                <input type="hidden" id="form-loan-id">
                <input type="hidden" id="form-status" value="待領取">
                <div class="col-span-1">
                    <label class="block text-xs font-bold text-gray-500 mb-1">借用人 <span class="text-red-500">*</span></label>
                    <input type="text" id="form-borrower" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                </div>
                <div class="col-span-1" style="position:relative;">
                    <label class="block text-xs font-bold text-gray-500 mb-1">單位 <span class="text-red-500">*</span></label>
                    <input type="text" id="form-dept" autocomplete="off" placeholder="輸入代碼或名稱搜尋…" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500" oninput="filterDeptList(this)" onfocus="showDeptDropdown()" onblur="setTimeout(()=>hideDeptDropdown(),200)">
                    <div id="dept-dropdown" class="absolute z-50 left-0 right-0 bg-white border border-gray-200 rounded-lg shadow-lg max-h-48 overflow-y-auto hidden" style="top:calc(100% + 2px);"></div>
                </div>
                <div class="col-span-1">
                    <label class="block text-xs font-bold text-gray-500 mb-1">分機/群呼 <span class="text-red-500">*</span></label>
                    <input type="text" id="form-phone" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                </div>
                <div class="col-span-2">
                    <label class="block text-xs font-bold text-gray-500 mb-1">使用時段 <span class="text-red-500">*</span></label>
                    <div class="flex items-center gap-2 flex-wrap">
                        <input type="date" id="form-use-date" onchange="refreshFormAvailableQty(); syncPickupFromUseDate()" class="bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                        <label class="flex items-center gap-1.5 text-sm text-gray-600 cursor-pointer select-none">
                            <input type="checkbox" id="form-allday" onchange="toggleAllDay(this.checked)" class="rounded text-blue-600 w-4 h-4">
                            整天
                        </label>
                        <div id="form-time-range" class="flex items-center gap-2">
                            <select id="form-time-start" onchange="syncPickupFromUseDate()" class="bg-gray-50 border border-gray-200 rounded-lg px-2 py-2 text-sm focus:outline-none focus:border-blue-500">
                                <option value="07:00前">07:00前</option>
<option value="07:00">07:00</option>
<option value="07:30">07:30</option>
<option value="08:00">08:00</option>
<option value="08:30">08:30</option>
<option value="09:00">09:00</option>
<option value="09:30">09:30</option>
<option value="10:00">10:00</option>
<option value="10:30">10:30</option>
<option value="11:00">11:00</option>
<option value="11:30">11:30</option>
<option value="12:00">12:00</option>
<option value="12:30">12:30</option>
<option value="13:00">13:00</option>
<option value="13:30">13:30</option>
<option value="14:00">14:00</option>
<option value="14:30">14:30</option>
<option value="15:00">15:00</option>
<option value="15:30">15:30</option>
<option value="16:00">16:00</option>
<option value="16:30">16:30</option>
<option value="17:00">17:00</option>
<option value="17:00後">17:00後</option>
                            </select>
                            <span class="text-gray-400 text-sm font-medium">～</span>
                            <select id="form-period" onchange="refreshFormAvailableQty()" class="bg-gray-50 border border-gray-200 rounded-lg px-2 py-2 text-sm focus:outline-none focus:border-blue-500">
                                <option value="07:00前">07:00前</option>
<option value="07:00">07:00</option>
<option value="07:30">07:30</option>
<option value="08:00">08:00</option>
<option value="08:30">08:30</option>
<option value="09:00">09:00</option>
<option value="09:30">09:30</option>
<option value="10:00">10:00</option>
<option value="10:30">10:30</option>
<option value="11:00">11:00</option>
<option value="11:30">11:30</option>
<option value="12:00">12:00</option>
<option value="12:30">12:30</option>
<option value="13:00">13:00</option>
<option value="13:30">13:30</option>
<option value="14:00">14:00</option>
<option value="14:30">14:30</option>
<option value="15:00">15:00</option>
<option value="15:30">15:30</option>
<option value="16:00">16:00</option>
<option value="16:30">16:30</option>
<option value="17:00">17:00</option>
<option value="17:00後">17:00後</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="col-span-1">
                    <label class="block text-xs font-bold text-gray-500 mb-1">地點 <span class="text-red-500">*</span></label>
                    <select id="form-location" onchange="handleLocationSelectChange('form')" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                    </select>
                    <input type="text" id="form-location-custom" placeholder="請輸入自訂地點..." class="w-full mt-1.5 bg-yellow-50 border border-yellow-200 rounded-lg px-3 py-1.5 text-sm focus:outline-none hidden">
                </div>
                <div class="col-span-1">
                    <label class="block text-xs font-bold text-gray-500 mb-1">領取日期時間 <span class="text-red-500">*</span></label>
                    <div class="flex gap-2 items-center flex-wrap">
                        <input type="date" id="form-pickup-date" class="bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                        <select id="form-pickup-time" onchange="refreshFormAvailableQty()" class="bg-gray-50 border border-gray-200 rounded-lg px-2 py-2 text-sm focus:outline-none focus:border-blue-500">
                            <option value="07:00前">07:00前</option>
<option value="07:00">07:00</option>
<option value="07:30">07:30</option>
<option value="08:00">08:00</option>
<option value="08:30">08:30</option>
<option value="09:00">09:00</option>
<option value="09:30">09:30</option>
<option value="10:00">10:00</option>
<option value="10:30">10:30</option>
<option value="11:00">11:00</option>
<option value="11:30">11:30</option>
<option value="12:00">12:00</option>
<option value="12:30">12:30</option>
<option value="13:00">13:00</option>
<option value="13:30">13:30</option>
<option value="14:00">14:00</option>
<option value="14:30">14:30</option>
<option value="15:00">15:00</option>
<option value="15:30">15:30</option>
<option value="16:00">16:00</option>
<option value="16:30">16:30</option>
<option value="17:00">17:00</option>
<option value="17:00後">17:00後</option>
                        </select>
                        <button type="button" onclick="setPickupNow()" class="shrink-0 bg-blue-500 hover:bg-blue-600 text-white text-xs font-medium px-2.5 py-2 rounded-lg transition flex items-center gap-1 shadow-sm" title="填入現在時間">
                            <i class="fa-regular fa-clock"></i> 立即領取
                        </button>
                    </div>
                </div>

            } catch { return '未知'; }
        }
        async function logAction(action, detail) {
            try {
                const ip = await getClientIP();
                const now = new Date();
                const pad = n => String(n).padStart(2,'0');
                const ts = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
                const logEntry = { ts, ip, action, detail: detail || '' };
                await set(ref(db, 'logs/log_' + Date.now()), logEntry);
            } catch(e) { console.warn('log error', e); }
        }
        window.logAction = logAction;



        function getLimitByName(name) {
            const found = inventoryArray.find(i => i.name === name);
            return found ? found.limit : 0;
        }

        // ── 以精確時間區間計算可用數量 ──
        // tStart / tEnd: timestamp（毫秒），代表欲借用的時間區間
        function getAvailableQtyByTime(itemName, tStart, tEnd, excludeLoanId = null) {
            const totalLimit = getLimitByName(itemName);
            let borrowedQty = 0;
            loans.forEach(loan => {
                if (loan.id === excludeLoanId) return;
                if (loan.status === '已歸還') return;
                if (!loan.items[itemName]) return;
                const loanStart = loan.pickupTime ? new Date(loan.pickupTime).getTime()
                    : new Date(loan.useDate + 'T00:00:00').getTime();
                const loanEnd = loan.returnTime ? new Date(loan.returnTime).getTime()
                    : new Date(loan.useDate + 'T23:59:59').getTime();
                if (loanStart < tEnd && loanEnd > tStart) {
                    borrowedQty += (parseInt(loan.items[itemName]) || 0);
                }
            });
            return Math.max(0, totalLimit - borrowedQty);
        }

        // 舊介面保留（庫存頁日期查詢用）
        function getAvailableQty(itemName, targetStartDate, targetEndDate, excludeLoanId = null) {
            const queryDate = targetStartDate || new Date().toISOString().split('T')[0];
            const tStart = new Date(queryDate + 'T00:00:00').getTime();
            const tEnd = targetEndDate
                ? new Date(targetEndDate + 'T23:59:59').getTime()
                : new Date(queryDate + 'T23:59:59').getTime();
            return getAvailableQtyByTime(itemName, tStart, tEnd, excludeLoanId);
        }

        // 取得某物品在同一天的下一筆借用（不含自身），回傳 { ts, loan } 或 null
        function getNextLoanOnSameDay(itemName, useDate, excludeLoanId = null) {
            if (!useDate) return null;
            const dayStart = new Date(useDate + 'T00:00:00').getTime();
            const dayEnd   = new Date(useDate + 'T23:59:59').getTime();
            let nearest = null;
            loans.forEach(loan => {
                if (loan.id === excludeLoanId) return;
                if (loan.status === '已歸還') return;
                if (!loan.items[itemName]) return;
                const loanStart = loan.pickupTime
                    ? new Date(loan.pickupTime).getTime()
                    : new Date(loan.useDate + 'T00:00:00').getTime();
                // 同一天的借用
                if (loanStart >= dayStart && loanStart <= dayEnd) {
                    if (nearest === null || loanStart < nearest.ts) {
                        nearest = { ts: loanStart, loan };
                    }
                }
            });
            return nearest;
        }

        function updateInventoryLimit(name, value) {
            const val = parseInt(value) || 1;
            const target = inventoryArray.find(i => i.name === name);
            if (target) {
                target.limit = val;
                saveToStorage();
            }
        }
        window.updateInventoryLimit = updateInventoryLimit;

        function addInventoryItem() {
            const inputName = document.getElementById('new-item-name');
            const inputTotal = document.getElementById('new-item-total');
            const name = inputName.value.trim();
            const total = parseInt(inputTotal.value) || 10;
            if (!name) return;
            if (inventoryArray.some(i => i.name === name)) {
                alert("該物品名稱已存在於庫存清單中！");
                return;
            }
            inventoryArray.push({ name: name, limit: total });
            saveToStorage();
            inputName.value = "";
            inputTotal.value = "10";
        }
        window.addInventoryItem = addInventoryItem;

        function deleteInventoryItem(name) {
            if (confirm(`確定要將庫存物品「${name}」完全移出品項清單嗎？`)) {
                inventoryArray = inventoryArray.filter(i => i.name !== name);
                saveToStorage();
            }
        }
        window.deleteInventoryItem = deleteInventoryItem;

        let activeInlineLoanId = null;
        function openInlineItemsModal(id) {
            activeInlineLoanId = id;
            const item = loans.find(l => l.id === id);
            if (!item) return;
            const targetDate = item.useDate;
            document.getElementById('inline-qty-calc-tip').innerHTML = `<i class="fa-solid fa-clock mr-1"></i>當前計算基準：依據此單使用日期 <b>${targetDate}</b> 演算剩餘可用庫存。`;
            const container = document.getElementById('inline-items-container');
            container.innerHTML = "";
            inventoryArray.forEach(invItem => {
                const currentQty = item.items[invItem.name] || 0;
                const isChecked = currentQty > 0;
                const loanPickup = item.pickupTime ? new Date(item.pickupTime).getTime() : new Date(item.useDate + 'T00:00:00').getTime();
                const loanReturn = item.returnTime ? new Date(item.returnTime).getTime() : new Date(item.useDate + 'T23:59:59').getTime();
                const avail = getAvailableQtyByTime(invItem.name, loanPickup, loanReturn, id);
                    const div = document.createElement('div');
                div.className = "flex items-center justify-between p-2 rounded-lg bg-gray-50 border border-gray-100 hover:bg-gray-100/70 transition";
                div.innerHTML = `
                    <label class="flex items-center space-x-2 text-sm font-medium text-gray-700 cursor-pointer flex-1 py-1">
                        <input type="checkbox" id="inline-chk-${invItem.name}" ${isChecked ? 'checked' : ''} onchange="toggleInlineQtyInput('${invItem.name}')" class="rounded text-blue-600 focus:ring-blue-500 w-4 h-4">
                        <div>
                            <div>${invItem.name}</div>
                            <div class="text-[10px] text-gray-400">目前剩餘可用：<span class="text-blue-600 font-bold">${avail}</span> / 上限 ${invItem.limit}</div>
                        </div>
                    </label>
                    <div class="flex items-center space-x-1 ${isChecked ? '' : 'opacity-30 pointer-events-none'}" id="inline-qty-box-${invItem.name}">
                        <input type="number" id="inline-num-${invItem.name}" value="${currentQty || 1}" min="1" max="${avail + currentQty}" class="w-16 bg-white border border-gray-300 rounded px-1.5 py-0.5 text-center text-sm focus:outline-none">
                    </div>`;
                container.appendChild(div);
            });
            const btnSave = document.getElementById('btn-save-inline-items');
            btnSave.onclick = saveInlineItems;
            btnSave.classList.remove('hidden');
            const m = document.getElementById('items-edit-modal');
            m.classList.remove('hidden');
            setTimeout(() => { m.classList.remove('opacity-0'); m.firstElementChild.classList.remove('scale-95'); }, 50);
        }
        window.openInlineItemsModal = openInlineItemsModal;

        function toggleInlineQtyInput(name) {
            const chk = document.getElementById(`inline-chk-${name}`);
            const box = document.getElementById(`inline-qty-box-${name}`);
            if (chk && chk.checked) box.classList.remove('opacity-30', 'pointer-events-none');
            else box.classList.add('opacity-30', 'pointer-events-none');
        }
        window.toggleInlineQtyInput = toggleInlineQtyInput;

        function closeItemsModal() {
            const m = document.getElementById('items-edit-modal');
            m.classList.add('opacity-0');
            m.firstElementChild.classList.add('scale-95');
            setTimeout(() => m.classList.add('hidden'), 200);
        }
        window.closeItemsModal = closeItemsModal;

        function saveInlineItems() {
            if (!activeInlineLoanId) return;
            const idx = loans.findIndex(l => l.id === activeInlineLoanId);
            if (idx === -1) return;
            const updatedItems = {};
            let isOverLimit = false;
            inventoryArray.forEach(invItem => {
                const chk = document.getElementById(`inline-chk-${invItem.name}`);
                if (chk && chk.checked) {
                    const qty = parseInt(document.getElementById(`inline-num-${invItem.name}`).value) || 1;
                    const originalQty = loans[idx].items[invItem.name] || 0;
                    const maxAvail = getAvailableQty(invItem.name, loans[idx].useDate, loans[idx].useDate, activeInlineLoanId) + originalQty;
                    if (qty > maxAvail) {
                        alert(`「${invItem.name}」要求的數量 (${qty}) 超過了最大可用量 (${maxAvail})！`);
                        isOverLimit = true;
                    }
                    updatedItems[invItem.name] = qty;
                }
            });
            if (isOverLimit) return;
            loans[idx].items = updatedItems;
            saveToStorage();
            closeItemsModal();
        }

        function openLoanModal(id = null) {
            const m = document.getElementById('loan-modal');
            const title = document.getElementById('loan-modal-title');
            buildLocationDropdown();
            const inputs = m.querySelectorAll('input, select, textarea');
            inputs.forEach(el => el.removeAttribute('disabled'));
            const saveBtn = m.querySelector('button[onclick="saveLoanForm()"]');
            saveBtn.classList.remove('hidden');
            if (id) {
                const item = loans.find(l => l.id === id);
                if (!item) return;
                title.innerHTML = currentUser
                    ? `<i class="fa-regular fa-pen-to-square mr-1.5 text-blue-400"></i>編輯借用單 (${id})`
                    : `<i class="fa-regular fa-folder-open mr-1.5 text-blue-400"></i>檢視借用單資料 (${id})`;
                document.getElementById('form-loan-id').value = item.id;
                document.getElementById('form-status').value = item.status || '待領取';
                document.getElementById('form-borrower').value = item.borrower;
                document.getElementById('form-dept').value = item.dept;
                document.getElementById('form-phone').value = item.phone;
                document.getElementById('form-use-date').value = item.useDate || '';
                // period stored as "HH:MM ～ HH:MM" or legacy text
                const isAllDayEdit = item.period === '整天';
                document.getElementById('form-allday').checked = isAllDayEdit;
                document.getElementById('form-time-range').classList.toggle('hidden', isAllDayEdit);
                if (!isAllDayEdit) {
                    const periodParts = item.period ? item.period.split(' ～ ') : [];
                    document.getElementById('form-time-start').value = periodParts[0] && /^\d{2}:\d{2}$/.test(periodParts[0]) ? periodParts[0] : '09:00';
                    document.getElementById('form-period').value = periodParts[1] && /^\d{2}:\d{2}$/.test(periodParts[1]) ? periodParts[1] : '18:00';
                }
                const ptParts = (item.pickupTime || '').split('T');
                document.getElementById('form-pickup-date').value = ptParts[0] || '';
                document.getElementById('form-pickup-time').value = ptParts[1] ? ptParts[1].slice(0,5) : '09:00';
                const rtParts = (item.returnTime || '').split('T');
                document.getElementById('form-return-date').value = rtParts[0] || '';
                document.getElementById('form-return-time').value = rtParts[1] ? rtParts[1].slice(0,5) : '18:00';
                document.getElementById('form-notes').value = item.notes;
                const selectLoc = document.getElementById('form-location');
                const customInput = document.getElementById('form-location-custom');
                if (LOCATION_OPTIONS.includes(item.location) && item.location !== '其他') {
                    selectLoc.value = item.location;
                    customInput.classList.add('hidden');
                    customInput.value = "";
                } else {
                    selectLoc.value = "其他";
                    if (currentUser) customInput.classList.remove('hidden');
                    customInput.value = item.location;
                }
            } else {
                title.innerHTML = `＋ 新增借用單`;
                document.getElementById('form-loan-id').value = "";
                document.getElementById('form-status').value = '待領取';
                document.getElementById('form-borrower').value = "";
                document.getElementById('form-dept').value = "";
                document.getElementById('form-phone').value = "";
                const searchStart = document.getElementById('search-start-date').value;
                const todayStr = new Date().toISOString().split('T')[0];
                const defDate = searchStart || todayStr;
                document.getElementById('form-use-date').value = defDate;
                document.getElementById('form-allday').checked = false;
                document.getElementById('form-time-range').classList.remove('hidden');
                document.getElementById('form-time-start').value = '09:00';
                document.getElementById('form-period').value = '17:00';
                document.getElementById('form-pickup-date').value = defDate;
                document.getElementById('form-pickup-time').value = '09:00';
                document.getElementById('form-return-date').value = defDate;
                document.getElementById('form-return-time').value = '17:00';
                document.getElementById('form-notes').value = "";
                document.getElementById('form-location').value = LOCATION_OPTIONS[0];
                document.getElementById('form-location-custom').classList.add('hidden');
                document.getElementById('form-location-custom').value = "";
            }
            refreshFormAvailableQty();
            m.classList.remove('hidden');
            setTimeout(() => { m.classList.remove('opacity-0'); m.firstElementChild.classList.remove('scale-95'); }, 50);
        }
        window.openLoanModal = openLoanModal;

        function refreshFormAvailableQty() {
            const itemsContainer = document.getElementById('form-items-container');
            itemsContainer.innerHTML = "";
            const id = document.getElementById('form-loan-id').value;
            const useDate = document.getElementById('form-use-date').value || '';
            const timeStartVal = document.getElementById('form-time-start').value || '00:00';
            const timeEndVal = document.getElementById('form-period').value || '23:59';
            const pickupDateVal = document.getElementById('form-pickup-date').value || useDate;
            const pickupTimeVal = document.getElementById('form-pickup-time').value || '00:00';
            const returnDateVal = document.getElementById('form-return-date').value || useDate;
            const returnTimeVal = document.getElementById('form-return-time').value || '23:59';

            // 以領取時間～歸還時間作為佔用區間；若未填則退回使用時段
            const tStart = pickupDateVal
                ? new Date(pickupDateVal + 'T' + pickupTimeVal).getTime()
                : (useDate ? new Date(useDate + 'T' + timeStartVal).getTime() : Date.now());
            const tEnd = returnDateVal
                ? new Date(returnDateVal + 'T' + returnTimeVal).getTime()
                : (useDate ? new Date(useDate + 'T' + timeEndVal).getTime() : Date.now() + 86400000);

            const calcTip = document.getElementById('form-qty-calc-tip');
            if (pickupDateVal && returnDateVal) {
                calcTip.innerHTML = `（依 <b>${pickupDateVal} ${pickupTimeVal}</b> ～ <b>${returnDateVal} ${returnTimeVal}</b> 計算餘額）`;
            } else if (useDate) {
                calcTip.innerHTML = `（依據 <b>${useDate}</b> 演算當前可用餘額）`;
            } else {
                calcTip.innerHTML = `（請先填寫使用日期與時間）`;
            }

            const currentLoanItemMap = id ? (loans.find(l => l.id === id)?.items || {}) : {};
            const editingId = document.getElementById('form-loan-id').value;
            const disabledAttr = (!editingId || currentUser) ? "" : "disabled";

            inventoryArray.forEach(invItem => {
                const originalQty = currentLoanItemMap[invItem.name] || 0;
                const isChecked = originalQty > 0;
                const avail = getAvailableQtyByTime(invItem.name, tStart, tEnd, id || null);
                const maxAllowed = avail + originalQty;

                // 警示：同一天有其他借用，顯示下一筆時間
                const nextInfo = getNextLoanOnSameDay(invItem.name, useDate, id || null);
                const showWarn = nextInfo !== null;
                const warnHtml = showWarn ? (() => {
                    const nextLoan = nextInfo.loan;
                    const nextStart = nextLoan.pickupTime
                        ? nextLoan.pickupTime.split('T')[1]?.slice(0,5)
                        : '—';
                    const nextEnd = nextLoan.returnTime
                        ? nextLoan.returnTime.split('T')[1]?.slice(0,5)
                        : '—';
                    const borrower = nextLoan.borrower || '';
                    return `<span class="text-amber-600 font-bold ml-1 block text-[10px]" title="同天下一筆：${borrower} ${nextStart}～${nextEnd}">⚠ 同天另有借用 ${nextStart}～${nextEnd} (${borrower})</span>`;
                })() : '';

                const div = document.createElement('div');
                div.className = "flex items-center justify-between p-2 rounded bg-gray-50 border border-gray-200 text-xs" + (showWarn ? ' border-amber-300 bg-amber-50' : '');
                div.innerHTML = `
                    <label class="flex items-center space-x-1.5 cursor-pointer flex-1">
                        <input type="checkbox" id="form-chk-${invItem.name}" ${isChecked ? 'checked' : ''} ${disabledAttr} onchange="toggleFormQtyInput('${invItem.name}')" class="rounded text-blue-600 focus:ring-blue-400">
                        <div>
                            <span class="font-medium text-gray-700">${invItem.name}</span>${warnHtml}
                            <span class="text-[10px] text-gray-400 block">剩餘 <b>${avail}</b> / 總數 ${invItem.limit}</span>
                        </div>
                    </label>
                    <div class="flex items-center space-x-1 ${isChecked ? '' : 'opacity-30 pointer-events-none'}" id="form-qty-box-${invItem.name}">
                        <input type="number" id="form-num-${invItem.name}" value="${originalQty || 1}" ${disabledAttr} min="1" max="${maxAllowed}" class="w-12 bg-white border border-gray-300 rounded text-center py-0.5 text-xs focus:outline-none">
                    </div>`;
                itemsContainer.appendChild(div);
            });
        }
        window.refreshFormAvailableQty = refreshFormAvailableQty;

        function setPickupNow() {
            const now = new Date();
            const pad = n => String(n).padStart(2,'0');
            const dateVal = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}`;
            const mins = now.getMinutes() < 30 ? '00' : '30';
            const h = now.getHours();
            let timeVal;
            if (h < 7 || (h === 7 && now.getMinutes() < 0)) timeVal = '07:00前';
            else if (h > 17 || (h === 17 && now.getMinutes() > 0)) timeVal = '17:00後';
            else timeVal = `${pad(h)}:${mins}`;
            document.getElementById('form-pickup-date').value = dateVal;
            document.getElementById('form-pickup-time').value = timeVal;
            // 自動將狀態改為借用中
            document.getElementById('form-status').value = '借用中';
            refreshFormAvailableQty();
        }
        window.setPickupNow = setPickupNow;



        function syncPickupFromUseDate() {
            const dateOnly = document.getElementById('form-use-date').value;
            const timeStart = document.getElementById('form-time-start').value || '09:00';
            if (!dateOnly) return;
            if (!document.getElementById('form-pickup-date').value)
                document.getElementById('form-pickup-date').value = dateOnly;
            if (!document.getElementById('form-return-date').value)
                document.getElementById('form-return-date').value = dateOnly;
            if (!document.getElementById('form-return-time').value)
                document.getElementById('form-return-time').value = '17:00';
        }
        function formatPeriod(period) {
            if (!period) return '';
            // Already clean "HH:MM ～ HH:MM"
            if (/^\d{2}:\d{2} ～ \d{2}:\d{2}$/.test(period)) return period;
            // Legacy "YYYY-MM-DDTHH:MM ～ YYYY-MM-DDTHH:MM"
            return period.replace(/(\d{4}-\d{2}-\d{2}T)/g, '').replace(/~/g, '～');
        }
        window.formatPeriod = formatPeriod;

        window.syncPickupFromUseDate = syncPickupFromUseDate;

        function toggleAllDay(checked) {
            const timeRange = document.getElementById('form-time-range');
            if (checked) {
                timeRange.classList.add('hidden');
                document.getElementById('form-time-start').value = '08:00';
                document.getElementById('form-period').value = '17:00';
            } else {
                timeRange.classList.remove('hidden');
            }
        }
        window.toggleAllDay = toggleAllDay;





        function toggleFormQtyInput(name) {
            const chk = document.getElementById(`form-chk-${name}`);
            const box = document.getElementById(`form-qty-box-${name}`);
            if (chk && chk.checked) box.classList.remove('opacity-30', 'pointer-events-none');
            else box.classList.add('opacity-30', 'pointer-events-none');
        }
        window.toggleFormQtyInput = toggleFormQtyInput;

        function closeLoanModal() {
            const m = document.getElementById('loan-modal');
            m.classList.add('opacity-0');
            m.firstElementChild.classList.add('scale-95');
            setTimeout(() => m.classList.add('hidden'), 200);
        }
        window.closeLoanModal = closeLoanModal;

        function saveLoanForm() {
            const id = document.getElementById('form-loan-id').value;
            const borrower = document.getElementById('form-borrower').value.trim();
            const dept = document.getElementById('form-dept').value.trim();
            const phone = document.getElementById('form-phone').value.trim();
            const useDate = document.getElementById('form-use-date').value || '';
            const isAllDay = document.getElementById('form-allday').checked;
            const timeStart = document.getElementById('form-time-start').value || '';
            const timeEnd = document.getElementById('form-period').value || '';
            const period = isAllDay ? '整天' : (timeStart && timeEnd ? timeStart + ' ～ ' + timeEnd : (timeStart || timeEnd || ''));
            const pickupDate = document.getElementById('form-pickup-date').value;
            const pickupTimeVal = document.getElementById('form-pickup-time').value;
            const pickupTime = pickupDate && pickupTimeVal ? pickupDate + 'T' + pickupTimeVal : '';
            const returnDate = document.getElementById('form-return-date').value;
            const returnTimeVal = document.getElementById('form-return-time').value;
            const returnTime = returnDate && returnTimeVal ? returnDate + 'T' + returnTimeVal : '';
            const notes = document.getElementById('form-notes').value.trim();
            const selectLoc = document.getElementById('form-location').value;
            let finalLocation = selectLoc;
            if (selectLoc === '其他') {
                finalLocation = document.getElementById('form-location-custom').value.trim();
                if (!finalLocation) finalLocation = "其他自訂地點";
            }
            if (!borrower || !dept || !phone || !useDate || !finalLocation || !pickupTime || !returnTime) {
                alert("請完整填寫所有必填欄位 (*)");
                return;
            }
            const selectedItems = {};
            let isOverLimit = false;
            inventoryArray.forEach(invItem => {
                const chk = document.getElementById('form-chk-' + invItem.name);
                if (chk && chk.checked) {
                    const qty = parseInt(document.getElementById('form-num-' + invItem.name).value) || 1;
                    const originalQty = id ? ((loans.find(l => l.id === id)?.items || {})[invItem.name] || 0) : 0;
                    const _sTs = pickupTime ? new Date(pickupTime).getTime() : new Date((useDate||'1970-01-01')+'T00:00:00').getTime();
                    const _eTs = returnTime ? new Date(returnTime).getTime() : new Date((useDate||'1970-01-01')+'T23:59:59').getTime();
                    const maxAllowed = getAvailableQtyByTime(invItem.name, _sTs, _eTs, id || null) + originalQty;
                    if (qty > maxAllowed) {
                        alert(`「${invItem.name}」數量超過可用餘額！`);
                        isOverLimit = true;
                    }
                    selectedItems[invItem.name] = qty;
                }
            });
            if (isOverLimit) return;
            if (Object.keys(selectedItems).length === 0) {
                alert("請至少選擇一項借用物品！");
                return;
            }
            if (id) {
                const idx = loans.findIndex(l => l.id === id);
                if (idx !== -1) {
                    const newStatus = document.getElementById('form-status').value;
            const prevStatus = loans[idx].status;
            loans[idx] = { ...loans[idx], borrower, dept, phone, useDate, period, location: finalLocation, pickupTime, returnTime, notes, items: selectedItems };
            if (newStatus === '借用中' && prevStatus !== '借用中') {
                loans[idx].status = '借用中';
                logAction('狀態變更', `單號: ${id} 借用人: ${borrower} → 借用中（現場領取）`);
            }
                }
            } else {

                const newId = "L" + String(Date.now()).slice(-6) + String(Math.floor(Math.random() * 10));
                const newLoan = {
                    id: newId, status: document.getElementById("form-status").value || "待領取",
                    borrower, dept, phone, useDate, period, location: finalLocation, pickupTime, returnTime, notes,
                    items: selectedItems
                };
                loans.unshift(newLoan);
            }
            const actionType = id ? '修改借用單' : '新增借用單';
            const detail = `借用人: ${borrower} 單位: ${dept}`;
            logAction(actionType, detail);
            saveToStorage();
            closeLoanModal();
        }
        window.saveLoanForm = saveLoanForm;

        function deleteLoan(id) {
            if (confirm(`確定要完全刪除單號 [${id}] 的借用紀錄嗎？(本操作不可還原)`)) {
                loans = loans.filter(l => l.id !== id);
                saveToStorage();
            }
        }
        window.deleteLoan = deleteLoan;

        // ---- 頁面初始化 ----
        window.onload = function () {
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            document.getElementById('current-date').innerText = todayStr.replace(/-/g, '/');
            // document.getElementById('search-start-date').value = todayStr; // 不預設篩選日期
            updateLoginStatusUI();
            buildLocationDropdown();
            refreshToolbarLayout();
            initFirebase();
        };

    </script>
</body>
